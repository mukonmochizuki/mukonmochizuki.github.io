<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>望月武懇 Mukon Mochizuki</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet" />
  
  <style>
    /* --- GLOBAL VARIABLES & RESET --- */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --deep-black: #0a0806;
      --warm-dark: #110e0a;
      --panel-bg: #1a1510;
      --orange-rope: #c85a0a;
      --off-white: #e8e0d4;
      --muted: rgba(232, 224, 212, 0.6);
      --sidebar-width: 280px;
      --header-height: 70px;
    }

    html, body {
      background-color: var(--deep-black);
      font-family: 'Cormorant Garamond', serif;
      color: var(--off-white);
      /* Removed the rigid height lock so the page can actually scroll! */
      min-height: 100vh; 
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* --- LAYOUT ARCHITECTURE --- */
    .layout-wrapper {
      display: flex;
      min-height: 100vh;
      min-height: 100dvh;
    }

    /* --- DESKTOP SIDEBAR --- */
    .sidebar {
      width: var(--sidebar-width);
      background-color: var(--warm-dark);
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      height: 100dvh;
      padding: 3rem 2rem;
      display: flex;
      flex-direction: column;
      border-right: 1px solid rgba(232, 224, 212, 0.05);
      z-index: 100;
    }

    .lang-toggle {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      margin-bottom: 3rem;
      cursor: pointer;
    }

    .lang-toggle span.active { color: var(--orange-rope); font-weight: 600; }

    .brand-jp {
      font-family: 'Noto Serif JP', serif;
      font-weight: 300;
      font-size: 1.2rem;
      letter-spacing: 0.25em;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }

    .brand-en {
      font-size: 2rem;
      font-weight: 400;
      line-height: 1.1;
      margin-bottom: 3rem;
    }

    .nav-links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      flex-grow: 1;
    }

    .nav-links a {
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      color: var(--muted);
      transition: color 0.3s ease;
      text-transform: uppercase;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--orange-rope);
    }

    /* Mobile Nav Checkbox Hack */
    #mobile-menu-toggle { display: none; }
    .mobile-header { display: none; }

    /* --- MAIN CONTENT AREA --- */
    .main-content {
      margin-left: var(--sidebar-width);
      width: calc(100% - var(--sidebar-width));
      display: flex;
      flex-direction: column;
    }

    /* --- HOMEPAGE HERO --- */
    .hero {
      position: relative;
      height: 100vh; /* Fallback */
      height: 100dvh;
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
    }

    .hero-photo {
      position: absolute;
      right: 0;
      top: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      filter: brightness(0.4) contrast(1.1);
      z-index: 1;
    }

    .hero-calligraphy {
      position: absolute;
      left: 5%;
      top: 5%;
      height: 90%;
      opacity: 0.8;
      z-index: 2;
    }

    /* --- PAGE SECTIONS --- */
    .content-section {
      padding: 6rem 5%;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .section-title {
      font-size: 2.5rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      margin-bottom: 3rem;
      color: var(--orange-rope);
      border-bottom: 1px solid var(--muted);
      padding-bottom: 1rem;
    }

    /* PROFILE OVERVIEW */
    .profile-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 4rem;
      margin-bottom: 4rem;
    }

    .profile-photo {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      border: 1px solid rgba(232, 224, 212, 0.1);
    }

    .bio-text p {
      font-size: 1.15rem;
      line-height: 1.8;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .card-btn {
      display: inline-block;
      padding: 0.5rem 1.2rem;
      background: transparent;
      color: var(--off-white);
      border: 1px solid var(--orange-rope);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: all 0.3s;
      margin-top: 1rem;
      cursor: pointer;
    }

    .card-btn:hover {
      background: var(--orange-rope);
      color: var(--deep-black);
    }

    /* --- UPCOMING EVENTS SECTION --- */
    .featured-event-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 3rem;
      align-items: flex-start;
      margin-bottom: 4rem;
    }

    .event-chirashi {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      object-position: top center;
      border: 1px solid rgba(232, 224, 212, 0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .event-details {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .event-date {
      color: var(--orange-rope);
      font-weight: 600;
      font-size: 1.1rem;
      text-transform: uppercase
